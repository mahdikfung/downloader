          git reset --hard origin/"$BRANCH"

          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

          ALL_FILES=()

          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -name "README.md" -print0 2>/dev/null)

          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -type f \( -name "*.zip" -o -name "*.z[0-9][0-9]" -o -name "*.z[0-9]" -o -name "*.mp4" -o -name "*.mp3" -o -name "*.m4a" -o -name "*.exe" -o -name "*.iso" -o -name "*.tar*" -o -name "*.rar" \) -print0 2>/dev/null | sort -z)

          TOTAL_FILES=${#ALL_FILES[@]}
          echo "📦 Found $TOTAL_FILES files"
          echo ""

          if [ $TOTAL_FILES -eq 0 ]; then
            git add README.md 2>/dev/null || true
            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "[StellarOracle] Update README [skip ci]"
              timeout 90 git push origin HEAD:"$BRANCH" || true
            fi
            exit 0
          fi

          TOTAL_SIZE=0
          for F in "${ALL_FILES[@]}"; do
            if [ -f "$F" ]; then
              FSIZE=$(stat -c%s "$F" 2>/dev/null || echo 0)
              TOTAL_SIZE=$((TOTAL_SIZE + FSIZE))
            fi
          done
          TOTAL_SIZE_MB=$((TOTAL_SIZE / 1024 / 1024))
          echo "💾 Total size: ${TOTAL_SIZE_MB}MB"
          echo ""

          if [ $TOTAL_SIZE_MB -lt 100 ]; then
            echo "⚡ Small push - all at once"

            git add -f -A downloads/
            git add README.md

            if ! git diff --cached --quiet; then
              git commit -m "[StellarOracle] Downloaded files [skip ci]"

              PUSH_RETRY=0
              while [ $PUSH_RETRY -lt 5 ]; do
                PUSH_RETRY=$((PUSH_RETRY + 1))
                if timeout 180 git push origin HEAD:"$BRANCH"; then
                  echo "✓ All pushed!"
                  break
                else
                  echo "⚠ Retry $PUSH_RETRY/5..."
                  sleep $((2 + RANDOM % 3))
                  git fetch origin "$BRANCH"
                  git reset --hard origin/"$BRANCH"
                  mkdir -p downloads
                  cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
                  git add -f -A downloads/
                  git add README.md
                  if ! git diff --cached --quiet; then
                    git commit -m "[StellarOracle] Downloaded files [skip ci]"
                  fi
                fi
              done
            fi

          else
            echo "📦 Large push - batch mode (${TOTAL_SIZE_MB}MB)"
            echo ""

            push_batch "${ALL_FILES[@]}"

