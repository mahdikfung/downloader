---
name: ⬇️  01- Download from url

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 512m
          git config --global pack.packSizeLimit 200m
          git config --global pack.threads 4
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "✓ Git optimized for large file handling"

      - name: Install aria2 and zip
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 zip curl bc

      - name: 🚀 StellarOracle Downloader
        run: |
          echo "🌟 StellarOracle - Advanced Download Manager"
          echo ""

      - name: Download files
        run: |
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          SPLIT_THRESHOLD_MB=45
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          echo "🚀 StellarOracle - Downloading with mode: $MODE"
          echo "Split threshold: $SPLIT_THRESHOLD_MB MB"
          echo "Backup directory: $BACKUP_DIR"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "🔒 Password protection: ENABLED"
          else
            echo "🔓 Password protection: DISABLED"
          fi

          mkdir -p downloads tmp_downloads

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
          }

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then
              echo "$NAME"
              return
            fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          create_error_file() {
            local FILENAME="$1"
            local ERROR_MSG="$2"
            local URL="$3"
            local BASENAME_NO_EXT="${FILENAME%.*}"
            local FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BASENAME_NO_EXT")
            mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
            {
              echo "# ${FILENAME} - Download Failed"
              echo ""
              echo "---"
              echo ""
              echo "## Download Information"
              echo ""
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| **File** | \`${FILENAME}\` |"
              echo "| **URL** | ${URL} |"
              echo "| **Date** | $(date '+%Y-%m-%d %H:%M:%S UTC') |"
              echo "| **Status** | **FAILED** |"
              echo ""
              echo "---"
              echo ""
              echo "## Error Details"
              echo ""
              echo "\`\`\`"
              echo "$ERROR_MSG"
              echo "\`\`\`"
              echo ""
              echo "---"
              echo ""
              echo "## Solutions"
              echo ""
              echo "- Verify URL is correct and accessible"
              echo "- Check if file still exists on server"
              echo "- Ensure proper authentication if required"
              echo "- Try again if temporary server issue"
              echo ""
              echo "*Powered by StellarOracle*"
            } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
            echo "✓ Error file created"
          }

          download_with_retry() {
            local URL="$1"
            local FILENAME="$2"
            local MAX_RETRIES=3
            local RETRY_DELAY=2
            local SUCCESS=false
            local ERROR_LOG=""

            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "⏳ Attempt $attempt/$MAX_RETRIES: $FILENAME"

              rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"

              ERROR_LOG=$(aria2c \
                --split=4 \
                --max-connection-per-server=4 \
                --min-split-size=10M \
                --max-tries=2 \
                --retry-wait=2 \
                --timeout=45 \
                --connect-timeout=20 \
                --follow-torrent=false \
                --check-certificate=false \
                --allow-overwrite=true \
                --auto-file-renaming=false \
                --dir="tmp_downloads" \
                --out="$FILENAME" \
                "$URL" 2>&1)

              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                local FILE_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
                if [ "$FILE_SIZE" -gt 0 ]; then
                  SUCCESS=true
                  echo "✓ Downloaded: $FILENAME ($(( FILE_SIZE / 1024 / 1024 ))MB)"
                  break
                fi
              fi

              rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
              echo "⚠ aria2c failed, trying curl..."

              ERROR_LOG=$(curl -L -f -# \
                --retry 2 \
                --retry-delay 2 \
                --connect-timeout 20 \
                --max-time 1800 \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                -o "tmp_downloads/$FILENAME" \
                "$URL" 2>&1)

              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                local FILE_SIZE=$(stat -c%s "tmp_downloads/$FILENAME" 2>/dev/null || echo "0")
                if [ "$FILE_SIZE" -gt 0 ]; then
                  SUCCESS=true
                  echo "✓ Downloaded: $FILENAME ($(( FILE_SIZE / 1024 / 1024 ))MB)"
                  break
                fi
              fi

              rm -f "tmp_downloads/$FILENAME"
              echo "⏱ Waiting before retry..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY + 1))
            done

            if [ "$SUCCESS" = true ] && [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
              return 0
            fi

            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
            create_error_file "$FILENAME" "Download failed after $MAX_RETRIES attempts" "$URL"
            return 1
          }

          for URL in $URLS; do
            FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//')
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g')
            echo "📥 $URL"
            download_with_retry "$URL" "$FILENAME" || echo "❌ Failed: $FILENAME"
          done

          if [ "$MODE" = "zip" ]; then
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S)"
              FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$ARCHIVE_NAME")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"

              VALID_FILES=()
              for f in tmp_downloads/*; do
                if [ -f "$f" ] && [ -s "$f" ]; then
                  VALID_FILES+=("$f")
                fi
              done

              if [ ${#VALID_FILES[@]} -gt 0 ]; then
                ARCHIVE_PATH="$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip"
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                    "${ARCHIVE_PATH}" \
                    "${VALID_FILES[@]}" > /dev/null
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m \
                    "${ARCHIVE_PATH}" \
                    "${VALID_FILES[@]}" > /dev/null
                fi

                if [ -s "${ARCHIVE_PATH}" ] || [ -n "$(ls "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null)" ]; then
                  FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")
                  DOWNLOAD_LINKS_MD=""
                  LINK_NUM=0
                  TOTAL_ARCHIVE_SIZE=0
                  for part_file in $(ls "$BACKUP_DIR/$FOLDER_NAME/"*.zip "$BACKUP_DIR/$FOLDER_NAME/"*.z[0-9]* 2>/dev/null | sort); do
                    [ -f "$part_file" ] || continue
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                    PART_SIZE=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                    TOTAL_ARCHIVE_SIZE=$((TOTAL_ARCHIVE_SIZE + PART_SIZE))
                  done
                  ARCHIVE_SIZE_MB=$(echo "scale=2; $TOTAL_ARCHIVE_SIZE / 1024 / 1024" | bc)

                  {
                    echo "# ${ARCHIVE_NAME} Archive"
                    echo ""
                    echo "---"
                    echo ""
                    echo "## Download Information"
                    echo ""
                    echo "| Property | Value |"
                    echo "|----------|-------|"
                    echo "| **Archive Name** | \`${ARCHIVE_NAME}.zip\` |"
                    echo "| **Total Size** | ${ARCHIVE_SIZE_MB} MB (${LINK_NUM} parts) |"
                    echo "| **Status** | **Complete (100%)** |"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      echo "| **Password Protected** | **YES** |"
                    else
                      echo "| **Password Protected** | **NO** |"
                    fi
                    echo ""
                    echo "---"
                    echo ""
                    echo "## Download Links"
                    echo ""
                    echo "| # | File | Link |"
                    echo "|---|------|------|"
                    printf '%s' "${DOWNLOAD_LINKS_MD}"
                    echo ""
                    echo "---"
                    echo ""
                    echo "## How to Extract"
                    echo ""
                    echo "1. Download all parts (.zip, .z01, .z02...)"
                    echo "2. Open with WinRAR, 7-Zip, or any standard zip tool"
                    echo "3. Extract - all parts combine automatically"
                    if [ -n "$ZIP_PASSWORD" ]; then
                      echo "4. Enter the password when prompted"
                    fi
                    echo ""
                    echo "---"
                    echo ""
                    echo "*Powered by StellarOracle*"
                  } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
                fi
              fi
            fi
            rm -rf tmp_downloads
          else
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue

              if [ ! -s "$FILE" ]; then
                rm -f "$FILE"
                continue
              fi

              SIZE=$(stat -c%s "$FILE")

              if [ "$SIZE" -le 0 ]; then
                rm -f "$FILE"
                continue
              fi

              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              EXT="${BASENAME##*.}"

              FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BASENAME_NO_EXT")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"

              FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")

              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                echo "📦 Splitting $(( SIZE / 1024 / 1024 ))MB into ${SPLIT_THRESHOLD_MB}MB parts"

                ARCHIVE_BASE="$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}"

                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m \
                    "${ARCHIVE_BASE}.zip" \
                    "$FILE" > /dev/null
                else
                  zip -j -s ${SPLIT_THRESHOLD_MB}m \
                    "${ARCHIVE_BASE}.zip" \
                    "$FILE" > /dev/null
                fi

                PARTS_COUNT=$(ls "$BACKUP_DIR/${FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | wc -l)

                if [ "$PARTS_COUNT" -eq 0 ]; then
                  continue
                fi

                TOTAL_SIZE=0
                for part_file in "$BACKUP_DIR/${FOLDER_NAME}"/*; do
                  if [ -f "$part_file" ]; then
                    PART_SIZE=$(stat -c%s "$part_file" 2>/dev/null || echo 0)
                    TOTAL_SIZE=$((TOTAL_SIZE + PART_SIZE))
                  fi
                done
                TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)

                DOWNLOAD_LINKS_MD=""
                LINK_NUM=0
                for part_file in $(ls "$BACKUP_DIR/${FOLDER_NAME}/"*.zip "$BACKUP_DIR/${FOLDER_NAME}/"*.z[0-9]* 2>/dev/null | sort); do
                  if [ -f "$part_file" ]; then
                    PART_BASENAME=$(basename "$part_file")
                    PART_ENCODED=$(urlencode "${PART_BASENAME}")
                    RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                    LINK_NUM=$((LINK_NUM + 1))
                    DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                  fi
                done

                README_FILE="$BACKUP_DIR/${FOLDER_NAME}/README.md"
                {
                  printf '%s\n' "# ${BASENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                  printf '%s\n' "| **Total Size** | **${PARTS_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password Protected** | **YES** |"
                  else
                    printf '%s\n' "| **Password Protected** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Links"
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s' "${DOWNLOAD_LINKS_MD}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## How to Extract"
                  printf '%s\n' ""
                  printf '%s\n' "1. Download all parts (.zip, .z01, .z02...)"
                  printf '%s\n' "2. Open with WinRAR, 7-Zip, or any standard zip tool"
                  printf '%s\n' "3. Extract - all parts combine automatically"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "4. Enter the password when prompted"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*Powered by StellarOracle*"
                } > "$README_FILE"

              else
                echo "📦 Creating zip: $BASENAME"

                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "${ZIP_PASSWORD}" \
                    "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" \
                    "$FILE" > /dev/null
                else
                  zip -j \
                    "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" \
                    "$FILE" > /dev/null
                fi

                if [ ! -s "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" ]; then
                  rm -f "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip"
                  continue
                fi

                SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                FILE_ENCODED=$(urlencode "${FOLDER_NAME}.zip")
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENCODED}"

                README_FILE="$BACKUP_DIR/${FOLDER_NAME}/README.md"
                {
                  printf '%s\n' "# ${BASENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                  printf '%s\n' "| **Size** | ${SIZE_MB} MB |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "| **Password Protected** | **YES** |"
                  else
                    printf '%s\n' "| **Password Protected** | **NO** |"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Link"
                  printf '%s\n' ""
                  printf '%s\n' "| File | Link |"
                  printf '%s\n' "|------|------|"
                  printf '%s\n' "| \`${FOLDER_NAME}.zip\` | [Download](${RAW_LINK}) |"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## How to Extract"
                  printf '%s\n' ""
                  printf '%s\n' "1. Open with WinRAR, 7-Zip, or any standard zip tool"
                  printf '%s\n' "2. Extract the file"
                  if [ -n "$ZIP_PASSWORD" ]; then
                    printf '%s\n' "3. Enter the password when prompted"
                  fi
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "*Powered by StellarOracle*"
                } > "$README_FILE"
              fi
            done
            rm -rf tmp_downloads
          fi

          echo ""
          echo "===== Backup folder contents ====="
          find "$BACKUP_DIR" -type f | head -50

      - name: Update README.md with download links
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"

          mkdir -p downloads
          if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR 2>/dev/null)" ]; then
            cp -r "$BACKUP_DIR"/* downloads/
          fi

          FOLDERS=$(find downloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)

          if [ -z "$FOLDERS" ]; then
            exit 0
          fi

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          {
            echo "# 📥 Downloaded Files"
            echo ""
            "$FOLDERS" | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                FOLDER_ENCODED=$(urlencode "${FOLDER}")
                echo "- [${FOLDER}](./${FOLDER_ENCODED})"
              fi
            done
            echo ""
            echo "---"
            echo ""
            echo "*Powered by StellarOracle*"
          } > "downloads/README.md"

          SECTION_TITLE="📥 Downloads:"

          if [ ! -f "README.md" ]; then
            echo "# 🌟 StellarOracle Downloader" > README.md
            echo "" >> README.md
          fi

          if grep -q "$SECTION_TITLE" README.md; then
            sed -i "/$SECTION_TITLE/,/^---$/d" README.md
            sed -i '${/^$/d;}' README.md
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "## $SECTION_TITLE"
            echo ""
            COUNTER=1
            echo "$FOLDERS" | while read -r FOLDER; do
              if [ -n "$FOLDER" ]; then
                FOLDER_ENCODED=$(urlencode "${FOLDER}")
                echo "${COUNTER}. [$FOLDER]($REPO_URL/$FOLDER_ENCODED)"
                echo ""
                COUNTER=$((COUNTER + 1))
              fi
            done
            echo "---"
          } >> README.md

      - name: 🚀 Incremental Commit & Push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          echo "🚀 StellarOracle - Optimized Push Mode"
          echo ""

          BACKUP_FILE_COUNT=$(find "$BACKUP_DIR" -type f 2>/dev/null | wc -l)
          echo "📊 Total files to push: $BACKUP_FILE_COUNT"

          if [ "$BACKUP_FILE_COUNT" -eq 0 ]; then
            DOWNLOAD_FILE_COUNT=$(find downloads -type f 2>/dev/null | wc -l)
            if [ "$DOWNLOAD_FILE_COUNT" -eq 0 ]; then
              echo "✓ Nothing to push"
              exit 0
            fi
          fi

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          regenerate_downloads_readme() {
            DOWNLOADS_README="downloads/README.md"

            {
              echo "# 📥 Downloaded Files"
              echo ""
            } > "$DOWNLOADS_README"

            for folder in downloads/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue
              FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
              printf -- "- [%s](./%s)\n" "$FOLDER_NAME" "$FOLDER_ENCODED" >> "$DOWNLOADS_README"
            done

            {
              echo ""
              echo "---"
              echo ""
              echo "*Powered by StellarOracle*"
            } >> "$DOWNLOADS_README"
          }

          push_batch() {
            local BATCH_SIZE=5
            local FILES=("$@")
            local BATCH_COUNT=0
            local BATCH_FILES=()
            local TOTAL_PUSHED=0
            local TOTAL_FILES=${#FILES[@]}

            for FILE in "${FILES[@]}"; do
              BATCH_FILES+=("$FILE")
              BATCH_COUNT=$((BATCH_COUNT + 1))

              if [ $BATCH_COUNT -ge $BATCH_SIZE ]; then
                TOTAL_PUSHED=$((TOTAL_PUSHED + BATCH_COUNT))
                echo ""
                echo "⬆️  Batch ($TOTAL_PUSHED/$TOTAL_FILES)..."

                git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                git reset --hard origin/"$BRANCH" 2>/dev/null || true

                mkdir -p downloads
                cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

                for BF in "${BATCH_FILES[@]}"; do
                  git add -f "$BF" 2>/dev/null || true
                done

                if ! git diff --cached --quiet 2>/dev/null; then
                  git commit -m "[StellarOracle] Add batch $BATCH_COUNT files [skip ci]" --quiet 2>/dev/null || true

                  local PUSH_RETRY=0
                  while [ $PUSH_RETRY -lt 3 ]; do
                    PUSH_RETRY=$((PUSH_RETRY + 1))
                    if timeout 120 git push origin HEAD:"$BRANCH" 2>&1 | grep -q "To https"; then
                      echo "    ✓ Pushed!"
                      break
                    else
                      echo "    ⚠ Retry $PUSH_RETRY/3..."
                      git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                      git reset --hard origin/"$BRANCH" 2>/dev/null || true
                      mkdir -p downloads
                      cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
                      for BF in "${BATCH_FILES[@]}"; do
                        git add -f "$BF" 2>/dev/null || true
                      done
                      if ! git diff --cached --quiet 2>/dev/null; then
                        git commit -m "[StellarOracle] Add batch $BATCH_COUNT files [skip ci]" --quiet 2>/dev/null || true
                      fi
                      sleep 2
                    fi
                  done
                fi

                BATCH_FILES=()
                BATCH_COUNT=0
                sleep 1
              fi
            done

            if [ ${#BATCH_FILES[@]} -gt 0 ]; then
              TOTAL_PUSHED=$((TOTAL_PUSHED + ${#BATCH_FILES[@]}))
              echo ""
              echo "⬆️  Final batch ($TOTAL_PUSHED/$TOTAL_FILES)..."

              git fetch origin "$BRANCH" --quiet 2>/dev/null || true
              git reset --hard origin/"$BRANCH" 2>/dev/null || true
              mkdir -p downloads
              cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

              for BF in "${BATCH_FILES[@]}"; do
                git add -f "$BF" 2>/dev/null || true
              done

